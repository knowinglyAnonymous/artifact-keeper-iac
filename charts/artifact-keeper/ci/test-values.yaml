# CI test values for chart-testing (ct install) in kind clusters.
# Disables heavy components and uses minimal resources so the chart
# can be installed in a resource-constrained environment.

backend:
  replicaCount: 1
  image:
    tag: dev
    pullPolicy: IfNotPresent
  # Override the default ADMIN_PASSWORD ("admin" from values.yaml) so the
  # backend does not detect a default-password install and lock its /readyz
  # endpoint. Without this, chart-testing's helm --wait times out because
  # the pod never becomes Ready (startup probe against /readyz returns 503
  # for as long as the admin lock is active).
  env:
    ADMIN_PASSWORD: "CI-test-password-not-for-prod"
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 256Mi
  persistence:
    enabled: true
    size: 1Gi
  scanWorkspace:
    enabled: false
  autoscaling:
    enabled: false
  podDisruptionBudget:
    enabled: false

web:
  enabled: true
  replicaCount: 1
  image:
    tag: dev
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 256Mi
      ephemeral-storage: 512Mi

edge:
  enabled: false

postgres:
  enabled: true
  image:
    repository: postgres
    tag: "16-alpine"
  auth:
    username: registry
    password: registry
    database: artifact_registry
  persistence:
    size: 1Gi
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 256Mi
  initDb:
    enabled: true

opensearch:
  enabled: false

trivy:
  enabled: false

dependencyTrack:
  enabled: false

ingress:
  enabled: false

cosign:
  enabled: false

networkPolicy:
  enabled: false

serviceMonitor:
  enabled: false

externalSecrets:
  enabled: false

secrets:
  jwtSecret: "ci-nonprod-jwt-76ce00933faca9df20b027521d0b2a63a9b264c7155f7bd7"
  s3AccessKey: "ci-test-access"
  s3SecretKey: "ci-test-secret"
