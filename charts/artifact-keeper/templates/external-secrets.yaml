{{- if .Values.externalSecrets.enabled }}
# ExternalSecret that syncs core application secrets from AWS Secrets Manager
# into the Kubernetes Secret used by backend, opensearch, and DependencyTrack.
#
# Prerequisites:
# 1. External Secrets Operator installed (helm install external-secrets ...)
# 2. A ClusterSecretStore named "aws-secrets-manager" configured with IRSA
#    or static credentials for accessing AWS Secrets Manager.
# 3. The referenced secrets must exist in AWS Secrets Manager with the
#    expected JSON keys.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "artifact-keeper.fullname" . }}-secrets
  labels:
    {{- include "artifact-keeper.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.externalSecrets.storeName }}
    kind: {{ .Values.externalSecrets.storeKind }}
  target:
    name: {{ include "artifact-keeper.fullname" . }}-secrets
    creationPolicy: Owner
  data:
    # JWT signing secret
    - secretKey: JWT_SECRET
      remoteRef:
        key: {{ .Values.externalSecrets.secrets.jwtSecret }}
        property: jwt-secret
    # Database credentials
    - secretKey: DATABASE_URL
      remoteRef:
        key: {{ .Values.externalSecrets.secrets.dbCredentials }}
        property: database-url
    - secretKey: POSTGRES_PASSWORD
      remoteRef:
        key: {{ .Values.externalSecrets.secrets.dbCredentials }}
        property: password
    # S3 storage credentials
    - secretKey: S3_ACCESS_KEY
      remoteRef:
        key: {{ .Values.externalSecrets.secrets.s3Keys }}
        property: access-key
    - secretKey: S3_SECRET_KEY
      remoteRef:
        key: {{ .Values.externalSecrets.secrets.s3Keys }}
        property: secret-key
    # OpenSearch admin credentials
    - secretKey: OPENSEARCH_USERNAME
      remoteRef:
        key: {{ .Values.externalSecrets.secrets.opensearchAuth }}
        property: username
    - secretKey: OPENSEARCH_PASSWORD
      remoteRef:
        key: {{ .Values.externalSecrets.secrets.opensearchAuth }}
        property: password
    # DependencyTrack admin password
    {{- if .Values.dependencyTrack.enabled }}
    - secretKey: DTRACK_ADMIN_PASSWORD
      remoteRef:
        key: {{ .Values.externalSecrets.secrets.dtAdminPassword }}
        property: admin-password
    {{- end }}
    # SMTP password (when email delivery is configured)
    {{- if .Values.externalSecrets.secrets.smtpPassword }}
    - secretKey: SMTP_PASSWORD
      remoteRef:
        key: {{ .Values.externalSecrets.secrets.smtpPassword }}
        property: smtp-password
    {{- end }}
    # Migration encryption key — required at runtime to encrypt
    # source-connection credentials in the migration_jobs table. Without it,
    # POST /api/v1/migrations/connections returns 500.
    {{- if .Values.externalSecrets.secrets.migrationEncryptionKey }}
    - secretKey: MIGRATION_ENCRYPTION_KEY
      remoteRef:
        key: {{ .Values.externalSecrets.secrets.migrationEncryptionKey }}
        property: migration-encryption-key
    {{- end }}
{{- end }}
